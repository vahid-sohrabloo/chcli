version: "2"

linters:
  disable:
    - errcheck
  enable:
    # Default (minus errcheck — too noisy on defer .Close())
    - govet
    - staticcheck
    - unused
    - ineffassign

    # Bugs & correctness
    - bodyclose
    - durationcheck
    - errorlint
    - nilerr
    - nosprintfhostport
    - sqlclosecheck
    - recvcheck

    # Modernize & simplify
    - modernize
    - exptostd
    - intrange
    - copyloopvar
    - perfsprint
    - unconvert
    - usestdlibvars
    - mirror

    # Style & hygiene
    - misspell
    - dupword
    - gocritic
    - predeclared
    - nakedret
    - whitespace
    - nolintlint
    - prealloc
    - wastedassign
    - unparam

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - exitAfterDefer
        - evalOrder
        - appendCombine
        - commentedOutCode
    nakedret:
      max-func-lines: 20
    misspell:
      locale: US
    perfsprint:
      int-conversion: false

  exclusions:
    paths:
      - vendor
      - docs
    rules:
      - path: _test\.go
        linters:
          - unparam
      - path: generated\.go
        linters:
          - gocritic
          - misspell

formatters:
  enable:
    - gofmt

run:
  timeout: 5m
